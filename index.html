<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora de Desfase CCTV Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ------------------- */
    /*  Variables y Base   */
    /* ------------------- */
    :root {
      --color-primario: #1a2c3f; /* Azul noche más profundo */
      --color-secundario: #007BFF; /* Azul brillante para acciones */
      --color-terciario: #e74c3c; /* Rojo para alertas */
      --color-exito: #28a745; /* Verde para resultados positivos */
      --color-fondo: #f4f7f9; /* Gris muy claro */
      --color-texto: #333;
      --color-borde: #dce1e6;
      --color-blanco: #ffffff;
      --sombra-suave: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      --sombra-media: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--color-fondo);
      color: var(--color-texto);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    
    /* ------------------- */
    /*      Encabezado     */
    /* ------------------- */
    header {
      background: linear-gradient(135deg, var(--color-primario), #2c3e50);
      color: var(--color-blanco);
      padding: 2rem 1.5rem 1rem;
      text-align: center;
      box-shadow: var(--sombra-media);
      position: relative;
      z-index: 10;
    }

    header h1 {
        margin-bottom: 1.5rem;
        font-weight: 600;
        font-size: 2rem;
    }

    #relojes-container {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 2rem;
      margin-bottom: 1.5rem;
    }

    .reloj-contenedor {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    .etiqueta-zona {
      font-size: 0.8em;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      opacity: 0.8;
      font-weight: 500;
    }

    .reloj-zona, #reloj-local {
      font-family: 'Roboto Mono', monospace;
      padding: 0.6rem 1rem;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.2);
      min-width: 180px;
      text-align: center;
      font-weight: 500;
    }
    
    #reloj-local {
      font-size: 1.6em;
      background: rgba(255, 255, 255, 0.1);
      transform: scale(1.05);
      box-shadow: 0 0 15px rgba(0, 123, 255, 0.3);
    }

    .reloj-zona {
      font-size: 1.3em;
    }

    /* Navegación */
    .nav-footer {
      display: flex;
      justify-content: center;
      list-style: none;
      border-top: 1px solid rgba(255,255,255,0.1);
      padding-top: 1rem;
    }

    .nav-footer li a {
      color: var(--color-blanco);
      text-decoration: none;
      font-weight: 500;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      position: relative;
      transition: color 0.3s ease, background-color 0.3s ease;
    }

    .nav-footer li a:hover {
      background-color: rgba(255, 255, 255, 0.1);
      color: #a7c5ff;
    }

    /* ------------------- */
    /*   Contenido Principal */
    /* ------------------- */
    main {
      width: 95%;
      max-width: 800px;
      margin: 2rem auto;
      flex: 1;
    }

    #camara-container {
      display: grid;
      gap: 2rem;
    }

    .camara {
      background: var(--color-blanco);
      padding: 2rem;
      border-radius: 12px;
      box-shadow: var(--sombra-suave);
      border-top: 4px solid var(--color-secundario);
      position: relative;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .camara:hover {
        transform: translateY(-5px);
        box-shadow: var(--sombra-media);
    }

    .eliminar-camara {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: transparent;
      color: #aaa;
      border: none;
      width: 2rem;
      height: 2rem;
      border-radius: 50%;
      cursor: pointer;
      font-weight: bold;
      font-size: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background-color 0.3s, color 0.3s, transform 0.3s;
    }
    .eliminar-camara:hover {
        background-color: #fbecec;
        color: var(--color-terciario);
        transform: scale(1.1);
    }

    .camara label {
      display: block;
      margin-bottom: 0.5rem;
      color: var(--color-primario);
      font-weight: 600;
      font-size: 0.9rem;
    }
    .camara label:not(:first-of-type){
        margin-top: 1.2rem;
    }

    input[type="time"] {
      width: 100%;
      padding: 0.8rem 1rem;
      border: 2px solid var(--color-borde);
      border-radius: 8px;
      font-size: 1.1rem;
      font-family: 'Roboto Mono', monospace;
      transition: border-color 0.3s, box-shadow 0.3s;
      background-color: #fdfdfd;
    }

    input[type="time"]:focus {
      border-color: var(--color-secundario);
      outline: none;
      box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.2);
    }

    /* Botones */
    button {
      background-color: var(--color-secundario);
      color: var(--color-blanco);
      border: none;
      padding: 0.8rem 1.5rem;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      transition: all 0.3s ease;
    }

    button:hover {
      transform: translateY(-3px);
      box-shadow: 0 4px 8px rgba(0, 123, 255, 0.3);
    }
    button:active {
        transform: translateY(-1px);
    }
    
    .camara .calcular {
        margin-top: 1rem;
        width: 100%;
    }

    .botones-principales {
      display: flex;
      gap: 1rem;
      margin-top: 2rem;
      padding-top: 2rem;
      border-top: 1px solid var(--color-borde);
    }

    #agregar-camara {
        background-color: var(--color-exito);
    }
    #agregar-camara:hover {
      box-shadow: 0 4px 8px rgba(40, 167, 69, 0.3);
    }

    #borrar-todo {
      background-color: var(--color-terciario);
    }
    #borrar-todo:hover {
      box-shadow: 0 4px 8px rgba(231, 76, 60, 0.3);
    }

    /* Resultados y Alertas */
    .resultado, .resultado-desfase, .error {
      margin-top: 1rem;
      padding: 1rem;
      border-radius: 8px;
      border-left: 5px solid;
      font-size: 0.95rem;
      line-height: 1.6;
    }
    
    .resultado-desfase {
        background-color: #e9ecef;
        border-color: #6c757d;
    }

    .resultado {
      background-color: #eaf6ec;
      border-color: var(--color-exito);
      color: #155724;
    }
    .resultado strong {
        color: #0b2e13;
    }
    
    .error {
      color: #721c24;
      background-color: #f8d7da;
      border-color: var(--color-terciario);
    }

    /* ------------------- */
    /*        Footer       */
    /* ------------------- */
    footer {
      background: var(--color-primario);
      color: rgba(255, 255, 255, 0.7);
      padding: 1.5rem;
      text-align: center;
      margin-top: 2rem;
      font-size: 0.9rem;
    }
    
    /* ------------------- */
    /*    Responsividad    */
    /* ------------------- */
    @media (max-width: 768px) {
      header h1 {
        font-size: 1.5rem;
      }
      #relojes-container {
        flex-direction: column;
        gap: 1rem;
      }
    }
    
    @media (max-width: 600px) {
      .nav-footer {
        flex-direction: column;
        gap: 0.5rem;
        align-items: center;
      }
      
      header {
        padding: 1.5rem 1rem 1rem;
      }
      
      #reloj-local {
        font-size: 1.4em;
      }
      .reloj-zona {
        font-size: 1.1em;
      }
      
      main {
        width: 100%;
        padding: 0 1rem;
        margin: 1.5rem auto;
      }
      
      .camara {
        padding: 1.5rem;
      }
      
      .botones-principales {
        flex-direction: column;
      }
      
      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Calculadora de Desfase CCTV</h1>
    <div id="relojes-container">
      <div class="reloj-contenedor">
        <div class="etiqueta-zona">Hora Pacífico (PST)</div>
        <div id="reloj-pst" class="reloj-zona">--:--:--</div>
      </div>
      <div class="reloj-contenedor">
        <div class="etiqueta-zona">Hora Local</div>
        <div id="reloj-local">--:--:--</div>
      </div>
      <div class="reloj-contenedor">
        <div class="etiqueta-zona">Hora Este (EST)</div>
        <div id="reloj-est" class="reloj-zona">--:--:--</div>
      </div>
    </div>
    <nav>
  </header>

  <main>
    <div id="camara-container"></div>
    <div class="botones-principales">
      <button id="agregar-camara">➕ Añadir Cámara</button>
      <button id="borrar-todo">❌ Borrar Todo</button>
    </div>
  </main>

  <footer>
    <p>Sistema de cálculo de desfase CCTV © 2025</p>
  </footer>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // --- CÓDIGO AÑADIDO: EVITA GUARDAR EN EL HISTORIAL DE LA SESIÓN ---
      // Reemplaza la entrada actual en el historial para que el botón "atrás" se salte esta página.
      history.replaceState(null, "", window.location.href);

      // Configuración de relojes
      const relojLocal = document.getElementById('reloj-local');
      const relojPST = document.getElementById('reloj-pst');
      const relojEST = document.getElementById('reloj-est');
      
      const zonasHorarias = {
        local: { 
            elemento: relojLocal, 
            opciones: { hour12: false } // MEJORA: formato 24h
        },
        pst: { 
            elemento: relojPST, 
            opciones: { timeZone: 'America/Los_Angeles', hour12: false } // MEJORA: formato 24h
        },
        est: { 
            elemento: relojEST, 
            opciones: { timeZone: 'America/New_York', hour12: false } // MEJORA: formato 24h
        }
      };
    
      function actualizarRelojes() {
        const ahora = new Date();
        Object.entries(zonasHorarias).forEach(([zona, config]) => {
          config.elemento.textContent = ahora.toLocaleTimeString('es-ES', {
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit',
            ...config.opciones
          });
        });
      }
      setInterval(actualizarRelojes, 1000);
      actualizarRelojes();
    
      // Lógica principal de la aplicación
      const camaraContainer = document.getElementById('camara-container');
      const agregarCamaraBtn = document.getElementById('agregar-camara');
      const borrarTodoBtn = document.getElementById('borrar-todo');
    
      function manejarEnter(evento, inputs) {
        if (evento.key === 'Enter') {
          evento.preventDefault();
          const indexActual = inputs.indexOf(evento.target);
          if (indexActual < inputs.length - 1) {
            inputs[indexActual + 1].focus();
          } else {
             // Si es el último input, intentamos calcular
            const btnCalcular = evento.target.closest('.camara').querySelector('.calcular');
            if (btnCalcular) {
                btnCalcular.click();
            }
          }
        }
      }
    
      function agregarCamara() {
        const camaraId = `camara-${Date.now()}`;
        const camara = document.createElement('div');
        camara.className = 'camara';
        camara.id = camaraId;
        camara.innerHTML = `
          <button class="eliminar-camara" title="Eliminar esta cámara">×</button>
          
          <label for="hora-cctv-${camaraId}">Hora CCTV (HH:MM:SS)</label>
          <input type="time" id="hora-cctv-${camaraId}" class="hora-cctv" step="1" required>
          
          <label for="hora-real-${camaraId}">Hora Real (HH:MM:SS)</label>
          <input type="time" id="hora-real-${camaraId}" class="hora-real" step="1" required>
          
          <div class="resultado-desfase"></div>
          
          <label for="hora-incidente-${camaraId}">Nueva Hora Real (HH:MM:SS)</label>
          <input type="time" id="hora-incidente-${camaraId}" class="hora-incidente" step="1" required>
          
          <button class="calcular">Calcular Hora CCTV</button>
          
          <div class="resultado"></div>
        `;
    
        const elementos = {
          cctv: camara.querySelector('.hora-cctv'),
          real: camara.querySelector('.hora-real'),
          incidente: camara.querySelector('.hora-incidente'),
          resultadoDesfase: camara.querySelector('.resultado-desfase'),
          resultadoFinal: camara.querySelector('.resultado')
        };
    
        const inputs = [elementos.cctv, elementos.real, elementos.incidente];
        inputs.forEach(input => {
          input.addEventListener('keydown', (e) => manejarEnter(e, inputs));
        });

        // --- MEJORA: AUTORELLENAR HORA REAL ---
        elementos.cctv.addEventListener('blur', () => { // 'blur' se activa cuando se sale del campo
          if (elementos.cctv.value && !elementos.real.value) { // Solo si cctv tiene valor y real está vacío
            const ahora = new Date();
            // Formatea a HH:mm:ss
            elementos.real.value = ahora.toTimeString().split(' ')[0];
            // Disparamos un evento 'input' para que la lógica de desfase se actualice
            elementos.real.dispatchEvent(new Event('input')); 
          }
        });
        // --- FIN DE LA MEJORA ---
    
        const actualizarDesfase = () => {
          elementos.resultadoFinal.innerHTML = ''; // Limpiar resultado anterior al cambiar datos
          if (elementos.cctv.value && elementos.real.value) {
            const desfase = calcularDiferencia(elementos.cctv.value, elementos.real.value);
            const segundosAbs = Math.abs(desfase);
            
            if (desfase === 0) {
                 elementos.resultadoDesfase.innerHTML = `<strong>✅ Sincronizado:</strong> No hay desfase entre la hora real y el CCTV.`;
                 return;
            }

            const adelantada = desfase > 0; // Se invirtió la lógica para que coincida con "adelantada" vs "atrasada"
            const estado = adelantada 
              ? "La hora CCTV está ADELANTADA respecto a la hora real"
              : "La hora CCTV está ATRASADA respecto a la hora real"; 
            const icono = adelantada ? "⏰" : "⏳";
            elementos.resultadoDesfase.innerHTML = `<strong>${icono} Desfase detectado:</strong> ${estado} por ${formatearDuracion(segundosAbs)}.`;
          } else {
            elementos.resultadoDesfase.innerHTML = '';
          }
        };
    
        elementos.cctv.addEventListener('input', actualizarDesfase);
        elementos.real.addEventListener('input', actualizarDesfase);
    
        camara.querySelector('.calcular').addEventListener('click', () => {
          if (!elementos.cctv.value || !elementos.real.value) {
            elementos.resultadoFinal.innerHTML = '<div class="error">❌ Por favor, complete la hora CCTV y la hora Real para calcular el desfase.</div>';
            return;
          }
          if (!elementos.incidente.value) {
             elementos.resultadoFinal.innerHTML = '<div class="error">❌ Ingrese la "Nueva Hora Real" para hacer el cálculo.</div>';
            return;
          }
          const desfase = calcularDiferencia(elementos.cctv.value, elementos.real.value);
          const horaFinalCalculada = calcularHoraCCTV(elementos.incidente.value, desfase);

          elementos.resultadoFinal.innerHTML = `<div class="resultado"><strong>🕒 Hora CCTV a buscar:</strong> <strong>${horaFinalCalculada}</strong></div>`;
        });
    
        camara.querySelector('.eliminar-camara').addEventListener('click', () => {
          camara.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
          camara.style.opacity = '0';
          camara.style.transform = 'scale(0.9)';
          setTimeout(() => camara.remove(), 300);
        });
    
        camaraContainer.appendChild(camara);
      }
    
      function borrarHoras() {
        document.querySelectorAll('.camara').forEach(camara => {
          camara.querySelectorAll('input[type="time"]').forEach(input => input.value = '');
          camara.querySelectorAll('.resultado-desfase, .resultado').forEach(div => div.innerHTML = '');
        });
      }
    
      function calcularDiferencia(cctv, real) {
        // Se usan fechas ficticias para poder restar las horas. 'Z' indica UTC.
        const a = new Date(`1970-01-01T${cctv}Z`);
        const b = new Date(`1970-01-01T${real}Z`);
        return (a.getTime() - b.getTime()) / 1000; // Desfase = (CCTV - Real) en segundos
      }
    
      function calcularHoraCCTV(incidente, desfaseSegundos) {
        const fechaIncidente = new Date(`1970-01-01T${incidente}Z`);
        fechaIncidente.setSeconds(fechaIncidente.getSeconds() + desfaseSegundos);
        
        // Extrae HH:mm:ss del resultado
        return fechaIncidente.toISOString().substr(11, 8);
      }
    
      function formatearDuracion(totalSegundos) {
        const h = Math.floor(totalSegundos / 3600);
        const m = Math.floor((totalSegundos % 3600) / 60);
        const s = Math.floor(totalSegundos % 60);
        
        let partes = [];
        if (h > 0) partes.push(`${h}h`);
        if (m > 0) partes.push(`${m}m`);
        if (s > 0 || partes.length === 0) partes.push(`${s}s`);
        
        return partes.join(' ');
      }
    
      agregarCamaraBtn.addEventListener('click', agregarCamara);
      borrarTodoBtn.addEventListener('click', () => {
          // Pregunta para confirmar antes de borrar todo
        if (confirm('¿Estás seguro de que quieres borrar los datos de todas las cámaras?')) {
            const camaras = camaraContainer.querySelectorAll('.camara');
            camaras.forEach((cam, index) => {
                // Borra todas las cámaras menos la primera
                if(index > 0) {
                    cam.remove();
                } else {
                    // Limpia los campos de la primera cámara
                     cam.querySelectorAll('input[type="time"]').forEach(input => input.value = '');
                     cam.querySelectorAll('.resultado-desfase, .resultado').forEach(div => div.innerHTML = '');
                }
            });
        }
      });
      
      // Crea la primera cámara por defecto al cargar la página
      agregarCamara();
    });
</script>
</body>  
</html>
